<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Galaxy | Samsung HK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600&display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background-color: #f8f9fa;
        }
        
        .heading-font {
            font-family: 'Poppins', system_ui, sans-serif;
        }

        .samsung-blue {
            color: #007AFF;
        }

        .samsung-btn {
            background-color: #007AFF;
            color: white;
            font-weight: 600;
            transition: all 0.2s ease;
            border-radius: 9999px;
            padding-top: 14px;
            padding-bottom: 14px;
        }
        
        .samsung-btn:hover {
            background-color: #0066CC;
            transform: translateY(-1px);
        }

        .device-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            border: 1px solid #e5e7eb;
        }
        
        .device-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        .device-card.selected {
            border-color: #007AFF;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #64748b;
        }

        .sticky-bar {
            box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.1), 0 -2px 4px -2px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto px-6 pt-10 pb-24">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center gap-x-2 px-4 py-1 rounded-full bg-blue-50 text-xs tracking-[1px] mb-4 text-[#007AFF]">
                <div class="w-2 h-2 bg-[#007AFF] rounded-full animate-pulse"></div>
                <span class="font-medium">NEW FLOW • PRODUCT FIRST</span>
            </div>
            <h1 class="text-5xl font-semibold tracking-tighter heading-font text-gray-900">Choose your new Galaxy.<br>Then trade in.</h1>
            <p class="text-xl text-gray-600 mt-3 max-w-md mx-auto">Simple. Transparent. Instant savings.</p>
        </div>

        <!-- Step 1: Choose New Device -->
        <div class="mb-12">
            <div class="section-title mb-3">1. Select your new device</div>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" id="device-selection">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Step 2: Storage -->
        <div class="mb-12 hidden" id="storage-section">
            <div class="section-title mb-3">2. Choose storage</div>
            <select id="storage" onchange="updateSelectedDeviceStorage()" class="w-full border border-gray-300 focus:border-[#007AFF] rounded-2xl px-5 py-4 text-lg appearance-none bg-white">
                <option value="">Select storage</option>
            </select>
        </div>

        <!-- Step 3: Trade-in Device -->
        <div class="mb-12 hidden" id="tradein-section">
            <div class="flex items-center justify-between mb-3">
                <div class="section-title">3. Trade-in your current device (optional)</div>
            </div>

            <!-- No Trade-In Checkbox -->
            <div class="mb-4 flex items-center gap-x-2">
                <input type="checkbox" id="no-tradein" onchange="toggleNoTradeInNewFlow()" class="w-4 h-4 text-[#007AFF] border-gray-300 rounded focus:ring-[#007AFF]">
                <label for="no-tradein" class="text-sm text-gray-700 cursor-pointer">I have no device to trade-in</label>
            </div>

            <div class="space-y-4" id="tradein-fields">
                <div>
                    <label class="section-title mb-2 block">Brand</label>
                    <select id="brand" onchange="updateModelsNewFlow()" class="w-full border border-gray-300 focus:border-[#007AFF] rounded-2xl px-5 py-4 text-lg appearance-none bg-white">
                        <option value="">Select brand</option>
                    </select>
                </div>
                <div>
                    <label class="section-title mb-2 block">Model</label>
                    <select id="model" onchange="updateStorageNewFlow()" disabled class="w-full border border-gray-300 focus:border-[#007AFF] rounded-2xl px-5 py-4 text-lg appearance-none bg-white disabled:bg-white disabled:text-gray-500">
                        <option value="">Select model</option>
                    </select>
                </div>
                <div>
                    <label class="section-title mb-2 block">Storage</label>
                    <select id="tradein-storage" onchange="updateTradeInPriceNewFlow()" disabled class="w-full border border-gray-300 focus:border-[#007AFF] rounded-2xl px-5 py-4 text-lg appearance-none bg-white disabled:bg-white disabled:text-gray-500">
                        <option value="">Select storage</option>
                    </select>
                </div>

                <!-- Trade-in value display -->
                <div id="tradein-value-display" class="hidden mt-3 px-4 py-3 bg-emerald-50 border border-emerald-200 rounded-2xl text-sm text-emerald-700">
                    Your device trade-in value is <span id="tradein-value-amount" class="font-semibold"></span>
                </div>
            </div>
        </div>

        <!-- Step 4: Bank Promotion -->
        <div class="mb-8 hidden" id="bank-section">
            <div class="section-title mb-3">4. Bank promotion (optional)</div>
            <div class="flex items-center gap-3" id="bank-buttons">
                <!-- Populated by JS -->
            </div>

            <!-- SamsungPay checkbox -->
            <div id="samsungpay-row" class="hidden mt-3 flex items-center gap-x-2">
                <input type="checkbox" id="samsungpay" onchange="toggleSamsungPay()" class="w-4 h-4 text-[#007AFF] border-gray-300 rounded focus:ring-[#007AFF]">
                <label for="samsungpay" class="text-sm text-gray-700 cursor-pointer">Pay with SamsungPay</label>
            </div>

            <!-- Bank savings display -->
            <div id="bank-savings-display" class="hidden mt-3 px-4 py-3 bg-blue-50 border border-blue-200 rounded-2xl text-sm text-blue-700">
                <div id="bank-savings-total" class="font-medium"></div>
                <div id="bank-savings-lines" class="mt-1 text-xs text-blue-600 space-y-0.5"></div>
            </div>
        </div>
    </div>

    <!-- Sticky Bottom Bar -->
    <div id="sticky-bar" class="hidden fixed bottom-0 left-0 right-0 bg-white border-t z-[60] shadow-lg">
        <div class="max-w-4xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div>
                    <div id="sticky-device-name" class="font-semibold text-lg"></div>
                    <div id="sticky-original-price" class="text-sm text-gray-500"></div>
                </div>
                <div class="text-right">
                    <div id="sticky-pay-label" class="text-xs text-gray-500 mb-0.5"></div>
                    <div id="sticky-final-price" class="text-2xl font-semibold tabular-nums"></div>
                    <div id="sticky-savings" class="text-emerald-600 text-sm"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Same device data + logic from TradeInPush (simplified for demo)
        const recommendedProducts = [
            {
                name: "Galaxy S26 Ultra",
                image: "https://images.samsung.com/is/image/samsung/p6pim/hk/s2602/gallery/hk-galaxy-s26-ultra-s948-578324-sm-s9480zsptgy-550823970?imbypass=true",
                storageOptions: [
                    { storage: "256GB+12GB", price: 10998 },
                    { storage: "512GB+12GB", price: 11998 },
                    { storage: "1TB+16GB", price: 14198 }
                ]
            },
            {
                name: "Galaxy Z Fold7",
                image: "https://images.samsung.com/is/image/samsung/p6pim/hk/f2507/gallery/hk-galaxy-z-fold7-f966-sm-f9660dbgtgy-547656345?imbypass=true",
                storageOptions: [
                    { storage: "256GB+12GB", price: 12998 },
                    { storage: "512GB+12GB", price: 13998 },
                    { storage: "1TB+16GB", price: 15998 }
                ]
            },
            {
                name: "Galaxy Z Flip7",
                image: "https://images.samsung.com/is/image/samsung/p6pim/hk/f2507/gallery/hk-galaxy-zflip7-f766-sm-f7660dbatgy-547656635?imbypass=true",
                storageOptions: [
                    { storage: "256GB+12GB", price: 8998 },
                    { storage: "512GB+12GB", price: 9998 }
                ]
            }
        ];

        let selectedDevice = null;
        let selectedStorageIndex = null;
        let tradeInValue = 0;
        let selectedBank = 'none';
        let useSamsungPay = false;
        let devices = []; // loaded from devices.json

        function init() {
            renderDeviceSelection();
            populateBrandsNewFlow();
        }

        function renderDeviceSelection() {
            const container = document.getElementById('device-selection');
            container.innerHTML = '';
            
            recommendedProducts.forEach((product, idx) => {
                const card = document.createElement('div');
                card.className = `device-card p-5 rounded-3xl cursor-pointer border flex flex-row sm:flex-col gap-4 sm:gap-3`;
                card.innerHTML = `
                    <img src="${product.image}" class="w-20 h-20 sm:w-full sm:h-36 object-contain rounded-2xl bg-white flex-shrink-0" alt="${product.name}">
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold text-xl leading-tight">${product.name}</div>
                    </div>
                `;
                card.onclick = () => selectNewDevice(idx, card);
                container.appendChild(card);
            });
        }

        function selectNewDevice(idx, cardEl) {
            // Deselect all
            document.querySelectorAll('#device-selection .device-card').forEach(el => el.classList.remove('selected'));
            cardEl.classList.add('selected');

            selectedDevice = recommendedProducts[idx];
            selectedStorageIndex = null;

            // Reset downstream values
            tradeInValue = 0;
            selectedBank = 'none';
            document.getElementById('no-tradein').checked = false;
            document.getElementById('tradein-fields').style.display = '';
            document.getElementById('brand').value = '';
            document.getElementById('model').innerHTML = '<option value="">Select model</option>';
            document.getElementById('model').disabled = true;
            document.getElementById('tradein-storage').innerHTML = '<option value="">Select storage</option>';
            document.getElementById('tradein-storage').disabled = true;

            // Step 2 only
            document.getElementById('storage-section').classList.remove('hidden');
            document.getElementById('tradein-section').classList.add('hidden');
            document.getElementById('bank-section').classList.add('hidden');
            document.getElementById('samsungpay-row').classList.add('hidden');
            document.getElementById('samsungpay').checked = false;
            useSamsungPay = false;

            // Populate storage
            const storageSelect = document.getElementById('storage');
            storageSelect.innerHTML = '<option value="">Select storage</option>';
            selectedDevice.storageOptions.forEach((opt, i) => {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = opt.storage;
                storageSelect.appendChild(option);
            });

            updateStickyBar();

            // Auto scroll to storage
            setTimeout(() => {
                document.getElementById('storage-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 150);
        }

        function updateSelectedDeviceStorage() {
            const storageSelect = document.getElementById('storage');
            selectedStorageIndex = parseInt(storageSelect.value);

            if (selectedStorageIndex !== null && !isNaN(selectedStorageIndex)) {
                // Show step 3
                document.getElementById('tradein-section').classList.remove('hidden');
                // Keep step 4 hidden until trade-in is complete
                document.getElementById('bank-section').classList.add('hidden');
                // Auto scroll to trade-in
                setTimeout(() => {
                    document.getElementById('tradein-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 150);
            } else {
                // Storage unselected
                document.getElementById('tradein-section').classList.add('hidden');
                document.getElementById('bank-section').classList.add('hidden');
                tradeInValue = 0;
                selectedBank = 'none';
            }

            updateStickyBar();
        }

        // --- Trade-in logic (adapted from current page) ---
        function populateBrandsNewFlow() {
            const brandSelect = document.getElementById('brand');
            const uniqueBrands = [...new Set(devices.map(d => d.brand))].sort();
            brandSelect.innerHTML = '<option value="">Select brand</option>';
            uniqueBrands.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b;
                opt.textContent = b;
                brandSelect.appendChild(opt);
            });
        }

        function updateModelsNewFlow() {
            const brand = document.getElementById('brand').value;
            const modelSelect = document.getElementById('model');
            const storageSelect = document.getElementById('tradein-storage');
            const valueDisplay = document.getElementById('tradein-value-display');

            if (!brand) {
                // Brand cleared
                modelSelect.innerHTML = '<option value="">Select model</option>';
                modelSelect.disabled = true;
                storageSelect.innerHTML = '<option value="">Select storage</option>';
                storageSelect.disabled = true;
                valueDisplay.classList.add('hidden');
                tradeInValue = 0;
                document.getElementById('bank-section').classList.add('hidden');
                updateStickyBar();
                return;
            }

            modelSelect.disabled = false;
            modelSelect.innerHTML = '<option value="">Select model</option>';
            const models = [...new Set(devices.filter(d => d.brand === brand).map(d => d.model))].sort();
            models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m;
                opt.textContent = m;
                modelSelect.appendChild(opt);
            });

            // Reset downstream
            storageSelect.innerHTML = '<option value="">Select storage</option>';
            storageSelect.disabled = true;
            valueDisplay.classList.add('hidden');
            tradeInValue = 0;
            document.getElementById('bank-section').classList.add('hidden');
            updateStickyBar();
        }

        function updateStorageNewFlow() {
            const brand = document.getElementById('brand').value;
            const model = document.getElementById('model').value;
            const storageSelect = document.getElementById('tradein-storage');
            const valueDisplay = document.getElementById('tradein-value-display');

            if (!model) {
                // Model cleared
                storageSelect.innerHTML = '<option value="">Select storage</option>';
                storageSelect.disabled = true;
                valueDisplay.classList.add('hidden');
                tradeInValue = 0;
                document.getElementById('bank-section').classList.add('hidden');
                updateStickyBar();
                return;
            }

            storageSelect.disabled = false;
            storageSelect.innerHTML = '<option value="">Select storage</option>';
            const storages = [...new Set(devices.filter(d => d.brand === brand && d.model === model).map(d => d.storage))].sort();
            storages.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s;
                storageSelect.appendChild(opt);
            });

            valueDisplay.classList.add('hidden');
            tradeInValue = 0;
            document.getElementById('bank-section').classList.add('hidden');
            updateStickyBar();
        }

        function updateTradeInPriceNewFlow() {
            const brand = document.getElementById('brand').value;
            const model = document.getElementById('model').value;
            const storage = document.getElementById('tradein-storage').value;
            const valueDisplay = document.getElementById('tradein-value-display');
            const valueAmount = document.getElementById('tradein-value-amount');

            if (!brand || !model || !storage) {
                tradeInValue = 0;
                valueDisplay.classList.add('hidden');
                document.getElementById('bank-section').classList.add('hidden');
                updateStickyBar();
                return;
            }

            const device = devices.find(d => 
                d.brand === brand && 
                d.model === model && 
                d.storage === storage
            );

            tradeInValue = device ? device.trade_in_price : 0;

            // Show trade-in value message
            if (tradeInValue > 0) {
                valueAmount.textContent = `HK$${tradeInValue.toLocaleString()}`;
                valueDisplay.classList.remove('hidden');
            } else {
                valueDisplay.classList.add('hidden');
            }

            // Show step 4 only after trade-in storage selected
            document.getElementById('bank-section').classList.remove('hidden');
            document.getElementById('samsungpay-row').classList.remove('hidden');

            // Auto scroll to bank / SamsungPay
            setTimeout(() => {
                document.getElementById('bank-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 150);

            updateStickyBar();
        }

        function toggleNoTradeInNewFlow() {
            const checked = document.getElementById('no-tradein').checked;
            const fields = document.getElementById('tradein-fields');
            const valueDisplay = document.getElementById('tradein-value-display');
            const samsungRow = document.getElementById('samsungpay-row');

            if (checked) {
                fields.style.display = 'none';
                valueDisplay.classList.add('hidden');
                tradeInValue = 0;
                // Show step 4 immediately when "no trade-in" is selected
                document.getElementById('bank-section').classList.remove('hidden');
                samsungRow.classList.remove('hidden');

                // Auto scroll to bank / SamsungPay
                setTimeout(() => {
                    document.getElementById('bank-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
                }, 150);
            } else {
                // User un-checked "no trade-in" → restore previous selection and recalculate
                fields.style.display = '';

                // Re-evaluate the three dropdowns to restore trade-in value
                updateTradeInPriceNewFlow();

                // If the dropdowns are now complete, show the value banner and step 4
                const brand = document.getElementById('brand').value;
                const model = document.getElementById('model').value;
                const storage = document.getElementById('tradein-storage').value;

                if (brand && model && storage && tradeInValue > 0) {
                    valueDisplay.classList.remove('hidden');
                    document.getElementById('bank-section').classList.remove('hidden');
                    samsungRow.classList.remove('hidden');
                } else {
                    valueDisplay.classList.add('hidden');
                    document.getElementById('bank-section').classList.add('hidden');
                    samsungRow.classList.add('hidden');
                }

                // Reset SamsungPay when coming back from "no trade-in"
                document.getElementById('samsungpay').checked = false;
                useSamsungPay = false;
            }
            updateStickyBar();
        }

        // Bank promotion rules (exact copy from TradeInPush)
        const bankPromotionRules = {
            "hsbc": {
                tiers: [
                    { max: 99999, percent: 0.04 }
                ],
                maximum: 400,
                fixedDiscount: null
            },
            "boc": {
                tiers: [
                    { max: 2999,  percent: 0.00 },
                    { max: 9999,  percent: 0.04 },
                    { max: 14999, percent: 0.05 },
                    { max: 99999, percent: 0.06 }
                ],
                maximum: 2000,
                fixedDiscount: { name: "BOC Visa Card Weekend Offer", value: 200 }
            }
        };

        function calculateBankRebate(originalPrice, bankKey) {
            const rule = bankPromotionRules[bankKey];
            if (!rule || originalPrice <= 0) return { percentRebate: 0, fixedRebate: 0, totalRebate: 0 };

            let percent = 0;
            for (const tier of rule.tiers) {
                if (originalPrice <= tier.max) {
                    percent = tier.percent;
                    break;
                }
            }

            let percentRebate = Math.floor(originalPrice * percent * 100) / 100;
            if (percentRebate > rule.maximum) percentRebate = rule.maximum;

            const fixedRebate = rule.fixedDiscount ? rule.fixedDiscount.value : 0;
            const totalRebate = percentRebate + fixedRebate;

            return { percentRebate, fixedRebate, fixedName: rule.fixedDiscount?.name || null, totalRebate };
        }

        function calculateSamsungPayDiscount(originalPrice) {
            if (originalPrice >= 10000) return 200;
            if (originalPrice >= 6000) return 100;
            if (originalPrice >= 3000) return 50;
            return 0;
        }

        // --- Bank promotion buttons ---
        function setupBankButtons() {
            const container = document.getElementById('bank-buttons');
            container.innerHTML = '';
            
            const banks = [
                { key: 'none', label: 'None' },
                { key: 'hsbc', label: 'HSBC' },
                { key: 'boc', label: 'BOC' }
            ];
            
            banks.forEach(bank => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-xl border text-sm ${bank.key === 'none' ? 'border-gray-300' : 'border-gray-200'}`;
                btn.textContent = bank.label;
                btn.onclick = () => {
                    selectedBank = bank.key;
                    document.querySelectorAll('#bank-buttons button').forEach(b => b.classList.remove('!border-[#007AFF]', 'ring-2'));
                    btn.classList.add('!border-[#007AFF]', 'ring-2', 'ring-[#007AFF]/30');
                    updateBankSavingsDisplay();
                    updateStickyBar();

                    // Auto scroll to SamsungPay when bank selected
                    setTimeout(() => {
                        const samsungRow = document.getElementById('samsungpay-row');
                        if (samsungRow && !samsungRow.classList.contains('hidden')) {
                            samsungRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, 200);
                };
                container.appendChild(btn);
            });
        }

        function updateBankSavingsDisplay() {
            const display = document.getElementById('bank-savings-display');
            const totalEl = document.getElementById('bank-savings-total');
            const linesEl = document.getElementById('bank-savings-lines');

            if (!selectedDevice || selectedStorageIndex === null || !selectedBank || selectedBank === 'none') {
                display.classList.add('hidden');
                return;
            }

            const storageOpt = selectedDevice.storageOptions[selectedStorageIndex];
            const originalPrice = storageOpt.price;

            const bankCalc = calculateBankRebate(originalPrice, selectedBank);
            if (bankCalc.totalRebate <= 0 && !useSamsungPay) {
                display.classList.add('hidden');
                return;
            }

            const samsungPayDiscount = useSamsungPay ? calculateSamsungPayDiscount(originalPrice) : 0;
            const grandTotal = bankCalc.totalRebate + samsungPayDiscount;

            // Total line
            totalEl.innerHTML = `Bank promotion savings: <span class="font-semibold">HK$${grandTotal.toLocaleString()}</span>`;

            // Breakdown lines
            linesEl.innerHTML = '';
            if (bankCalc.percentRebate > 0) {
                const pctLine = document.createElement('div');
                pctLine.textContent = `Credit card rebate HK$${bankCalc.percentRebate.toLocaleString()}`;
                linesEl.appendChild(pctLine);
            }
            if (bankCalc.fixedRebate > 0) {
                const fixedLine = document.createElement('div');
                fixedLine.textContent = `${bankCalc.fixedName || 'Special discount'} HK$${bankCalc.fixedRebate.toLocaleString()}`;
                linesEl.appendChild(fixedLine);
            }
            if (samsungPayDiscount > 0) {
                const samsungLine = document.createElement('div');
                samsungLine.textContent = `SamsungPay only discount HK$${samsungPayDiscount.toLocaleString()}`;
                linesEl.appendChild(samsungLine);
            }

            display.classList.remove('hidden');
        }

        function toggleSamsungPay() {
            useSamsungPay = document.getElementById('samsungpay').checked;
            updateBankSavingsDisplay();
            updateStickyBar();
        }

        // --- Sticky bar logic ---
        function updateStickyBar() {
            if (!selectedDevice) {
                document.getElementById('sticky-bar').classList.add('hidden');
                return;
            }

            document.getElementById('sticky-bar').classList.remove('hidden');

            // If storage not yet selected, show "from" price
            if (selectedStorageIndex === null) {
                const fromPrice = selectedDevice.storageOptions[0].price;
                document.getElementById('sticky-device-name').textContent = selectedDevice.name;
                document.getElementById('sticky-original-price').textContent = '';
                document.getElementById('sticky-final-price').innerHTML = `
                    <div class="text-right">
                        <div class="text-sm text-gray-500 mb-0.5">From</div>
                        <div class="text-2xl font-semibold tabular-nums">HK$${fromPrice.toLocaleString()}</div>
                    </div>
                `;
                document.getElementById('sticky-savings').classList.add('hidden');
                return;
            }

            const storageOpt = selectedDevice.storageOptions[selectedStorageIndex];
            const originalPrice = storageOpt.price;
            const basePrice = originalPrice - tradeInValue;
            
            // Real bank rebate using copied calculateBankRebate
            const bankCalc = (selectedBank && selectedBank !== 'none')
                ? calculateBankRebate(originalPrice, selectedBank)
                : { percentRebate: 0, fixedRebate: 0, totalRebate: 0 };
            const bankRebate = bankCalc.totalRebate || 0;
            const samsungPayDiscount = useSamsungPay ? calculateSamsungPayDiscount(originalPrice) : 0;

            const finalPrice = Math.max(0, basePrice - bankRebate - samsungPayDiscount);
            const totalSavings = originalPrice - finalPrice;

            document.getElementById('sticky-device-name').textContent = `${selectedDevice.name} • ${storageOpt.storage}`;
            document.getElementById('sticky-original-price').textContent = `Original: HK$${originalPrice.toLocaleString()}`;

            // Dynamic pay label
            let payLabel = '';
            const hasTradeIn = tradeInValue > 0;
            const hasBankPromo = (selectedBank && selectedBank !== 'none' && bankRebate > 0) || useSamsungPay;
            if (hasTradeIn && hasBankPromo) {
                payLabel = 'After Trade-In and Bank Promotion, you pay';
            } else if (hasTradeIn) {
                payLabel = 'After Trade-In, you pay';
            } else if (hasBankPromo) {
                payLabel = 'With Bank Promotion, you pay';
            } else {
                payLabel = 'Trade-In or select a Bank Promotion for extra savings';
            }
            document.getElementById('sticky-pay-label').textContent = payLabel;

            document.getElementById('sticky-final-price').innerHTML = `HK$${finalPrice.toLocaleString()}`;
            
            const savingsEl = document.getElementById('sticky-savings');
            if (totalSavings > 0) {
                savingsEl.textContent = `You save HK$${totalSavings.toLocaleString()}`;
                savingsEl.classList.remove('hidden');
            } else {
                savingsEl.classList.add('hidden');
            }
        }

        // Init
        async function loadDevices() {
            try {
                const res = await fetch('devices.json');
                devices = await res.json();
                console.log('Loaded', devices.length, 'devices');
            } catch (e) {
                console.error('Failed to load devices.json', e);
            }
        }

        window.onload = async function() {
            await loadDevices();
            init();
            setupBankButtons();
        };

        // Reset bank savings display on device/storage change
        const origSelectNewDevice = window.selectNewDevice;
        window.selectNewDevice = function(...args) {
            document.getElementById('bank-savings-display')?.classList.add('hidden');
            return origSelectNewDevice?.apply(this, args);
        };
    </script>
</body>
</html>
